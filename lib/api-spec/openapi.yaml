openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Laundromat management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Order management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order (e.g., mark as ready)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OrderItem:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
        category:
          type: string
      required:
        - name
        - quantity
        - unitPrice
        - totalPrice
        - category
    CreateOrderRequest:
      type: object
      properties:
        customerName:
          type: string
        whatsappNumber:
          type: string
        orderDate:
          type: string
        estimatedReadyDate:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalAmount:
          type: number
        discountAmount:
          type: number
        notes:
          type: string
        photoUrls:
          type: array
          items:
            type: string
      required:
        - customerName
        - whatsappNumber
        - orderDate
        - items
        - totalAmount
    UpdateOrderRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, ready, delivered]
        notes:
          type: string
    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        whatsappNumber:
          type: string
        orderDate:
          type: string
        estimatedReadyDate:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalAmount:
          type: number
        discountAmount:
          type: number
        status:
          type: string
          enum: [pending, ready, delivered]
        notes:
          type: string
        photoUrls:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - customerName
        - whatsappNumber
        - orderDate
        - items
        - totalAmount
        - status
        - createdAt
